name: CI
on: [push]

jobs:
  sast-scan:
    name: Run Bandit Scan
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      
      - name: Install python & setup
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install bandit
        run: pip install Bandit 

      - name: Run Bandit
        run: bandit -ii -ll -r . -f json -o bandit-report.json
      
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-findings
          path: bandit-report.json
  image_scan:
    name: Docker Scan CWE
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-docker-action@v5.0.0

      - name: Set short git commit SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -f Dockerfile \
            -t application:${{ env.short_sha }} \
            -t application:latest .
      
      - name: Docker Scout
        uses: docker/scout-action@v1.20.4
        with:
         dockerhub-password: ${{ secrets.DOCKERPASS }}
         dockerhub-user: ${{ secrets.DOCKERLOGIN }}
         command: quickview,cves
         only-severities: high, critical
         sarif-file: scout-report.sarif

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-scout-report
          path: scout-report.sarif
         
      
